<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#1d2671,#c33764);
    color: #fff;
}

header {
    text-align: center;
    padding: 20px;
    font-size: 24px;
    font-weight: bold;
}

section {
    padding: 50px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    margin: 15px auto;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

button {
    padding: 10px 20px;
    border: none;
    background: #00c6ff;
    color: #000;
    border-radius: 8px;
    cursor: pointer;
}

/* Admin Panel */
#adminPanel {
    position: fixed;
    right: 0;
    top: 0;
    width: 300px;
    height: 100%;
    background: #111;
    padding: 20px;
    display: none;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}

</style>
</head>

<body>

<header>
    Jay Gajipara 🚀
    <br>
    <button onclick="toggleAdmin()">Admin Panel</button>
</header>

<section>
    <h1 id="name">Hello, I'm Jay 👋</h1>
    <p id="role">Laravel Developer</p>
</section>

<section>
    <h2>About</h2>
    <div class="card" id="about">
        Passionate web developer from Rajkot.
    </div>
</section>

<section>
    <h2>Projects</h2>
    <div class="card" id="project">
        Car Showroom Management System
    </div>
</section>

<section>
    <h2>Contact</h2>
    <div class="card" id="contact">
        Email: jaygajipara07@gmail.com
    </div>
</section>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <h3>Admin Panel</h3>

    <label>Name</label>
    <input id="nameInput">

    <label>Role</label>
    <input id="roleInput">

    <label>About</label>
    <textarea id="aboutInput"></textarea>

    <label>Project</label>
    <textarea id="projectInput"></textarea>

    <label>Contact</label>
    <textarea id="contactInput"></textarea>

    <button onclick="updateData()">Save</button>
</div>

<script>
// Toggle Admin Panel
function toggleAdmin() {
    let panel = document.getElementById("adminPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// Update Data
function updateData() {
    document.getElementById("name").innerText = document.getElementById("nameInput").value;
    document.getElementById("role").innerText = document.getElementById("roleInput").value;
    document.getElementById("about").innerText = document.getElementById("aboutInput").value;
    document.getElementById("project").innerText = document.getElementById("projectInput").value;
    document.getElementById("contact").innerText = document.getElementById("contactInput").value;
}

// Animation on scroll
window.addEventListener("scroll", () => {
    document.querySelectorAll(".card").forEach(card => {
        card.style.opacity = "1";
        card.style.transform = "translateY(0)";
    });
});
</script>

</body>
</html>
